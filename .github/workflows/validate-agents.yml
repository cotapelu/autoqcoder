name: Validate AGENTS.md

on:
  push:
    branches: [ main, v1.* ]
    paths:
      - 'AGENTS.md'
      - 'test_verification.sh'
  pull_request:
    branches: [ main ]
    paths:
      - 'AGENTS.md'
      - 'test_verification.sh'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make test script executable
        run: chmod +x test_verification.sh

      - name: Run verification tests
        run: bash test_verification.sh

      - name: Check AGENTS.md line count
        run: |
          lines=$(wc -l < AGENTS.md)
          echo "Line count: $lines"
          if [ "$lines" -gt 100 ]; then
            echo "❌ FAIL: AGENTS.md has $lines lines (max 100)"
            exit 1
          fi
          echo "✅ PASS: Line count $lines ≤100"

      - name: Verify required sections
        run: |
          required_sections=("TOP 5" "TEMPLATE" "ANTI-PATTERNS" "SECURITY" "REVIEW GATE")
          for section in "${required_sections[@]}"; do
            if grep -q "$section" AGENTS.md; then
              echo "✅ Section found: $section"
            else
              echo "❌ Missing section: $section"
              exit 1
            fi
          done

      - name: Self-score check (must be ≥90 target mentioned)
        run: |
          if grep -q "Self-score.*≥90" AGENTS.md; then
            echo "✅ Self-score target ≥90 documented"
          else
            echo "❌ Self-score target not found"
            exit 1
          fi

      - name: Annotation on success
        if: success()
        run: |
          echo "🎉 All AGENTS.md validations passed!"
          echo "Line count: $(wc -l < AGENTS.md)"
          echo "Self-score target: ≥90"
          echo "All mandatory sections present"